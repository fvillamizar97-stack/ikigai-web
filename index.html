<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ikigai Senior Cali</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#f5f1e8;
  color:#2f2f32;
}

.container{
  max-width:1200px;
  margin:auto;
  padding:40px 20px;
}

h1{
  font-size:64px;
  line-height:1;
  margin-bottom:20px;
}

p{
  color:#6c675f;
  font-size:20px;
}

.buttons{
  margin-top:20px;
}

.btn{
  padding:14px 20px;
  border-radius:12px;
  margin-right:10px;
  text-decoration:none;
  color:white;
}

.btn-primary{background:#8c6f3f;}
.btn-black{background:black;}
.btn-green{background:#25D366;}

.hero{
  display:flex;
  gap:40px;
  align-items:center;
}

.hero-images{
  display:flex;
  gap:20px;
}

.hero-images img{
  width:220px;
  border-radius:20px;
  object-fit:cover;
}

.big-image img{
  width:320px;
  border-radius:20px;
}
</style>
</head>

<body>

<div class="container">
  <h1>Ikigai Senior Cali</h1>
  <p>Un hogar rodeado de naturaleza, paz y atención personalizada.</p>

  <div class="buttons">
    <a class="btn btn-primary" href="https://wa.me/573155207474">Agendar visita</a>
    <a class="btn btn-black" href="https://app.cloudpano.com/tours/C34djflqu" target="_blank">Recorrido virtual 360°</a>
    <a class="btn btn-green" href="https://wa.me/573155207474">Hablar por WhatsApp</a>
  </div>

  <div class="hero">
    <div class="hero-images">
      <!-- CAMBIO HECHO AQUÍ -->
      <img src="images/ikigai-card.jpg">
    </div>

    <div class="big-image">
      <!-- CAMBIO HECHO AQUÍ -->

    </div>
  </div>
</div>

</body>
</html>
