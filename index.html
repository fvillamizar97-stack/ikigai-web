<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ikigai Senior Cali</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f5f1ea;
  color: #333;
}

/* NAV */
nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px;
}

nav img {
  height: 50px;
}

.btn {
  background: #8b6b3e;
  color: white;
  padding: 12px 20px;
  border-radius: 10px;
  text-decoration: none;
  display: inline-block;
}

/* HERO */
.hero {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 60px 10%;
  flex-wrap: wrap;
}

.hero-text {
  max-width: 500px;
}

.hero h1 {
  font-size: 50px;
}

.hero img {
  width: 300px;
  border-radius: 20px;
}

/* SECCIONES */
.section {
  padding: 60px 10%;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 20px;
}

.card img {
  width: 100%;
  border-radius: 20px;
}

.card {
  background: white;
  padding: 10px;
  border-radius: 20px;
}

/* BOTONES */
.buttons {
  margin-top: 20px;
}

.buttons a {
  margin-right: 10px;
}
</style>
</head>

<body>

<!-- NAV -->
<nav>
  <img src="logo.png">
  <a href="https://www.instagram.com/ikigai.senior/" target="_blank" class="btn">Instagram</a>
</nav>

<!-- HERO -->
<section class="hero">
  <div class="hero-text">
    <h1>Ikigai Senior Cali</h1>
    <p>Un hogar rodeado de naturaleza, paz y atención personalizada.</p>

    <div class="buttons">
      <a href="https://wa.me/573044099713" class="btn">Agendar visita</a>

      <!-- BOTÓN RECORRIDO -->
      <a href="https://app.cloudpano.com/tours/C34djflqu" target="_blank" class="btn" style="background:#000;">
        Recorrido virtual 360°
      </a>
    </div>
  </div>

  <img src="hero.jpg">
</section>

<!-- PROYECTO -->
<section class="section">
  <h2>El proyecto</h2>

  <div class="grid">
    <div class="card">
      <img src="proyecto.jpg">
    </div>

    <div class="card">
      <img src="suite.jpg">
    </div>
  </div>
</section>

<!-- EXPERIENCIAS -->
<section class="section">
  <h2>Experiencias</h2>

  <div class="grid">
    <div class="card"><img src="piscina.jpg"></div>
    <div class="card"><img src="zona.jpg"></div>
    <div class="card"><img src="arte.jpg"></div>
  </div>
</section>

<!-- SERVICIOS -->
<section class="section">
  <h2>Servicios</h2>

  <div class="grid">
    <div class="card"><img src="servicios.jpg"></div>
    <div class="card"><img src="cine.jpg"></div>
  </div>
</section>

</body>
</html>
